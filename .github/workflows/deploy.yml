name: Deploy React App to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Node setup
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install deps
      run: npm install

    - name: Build
      run: npm run build

    - name: Deploy
      uses: appleboy/scp-action@master
      with:
        host: 3.93.52.143
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "build/*"
        target: "/var/www/html/"