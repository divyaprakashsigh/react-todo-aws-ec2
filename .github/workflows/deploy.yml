name: Deploy React App to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install dependencies
      run: npm install

    - name: Build
      run: npm run build

    - name: Deploy via SSH
      uses: appleboy/ssh-action@master
      with:
        host: 3.93.52.143
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          rm -rf /var/www/html/*
          
    - name: Copy files
      uses: appleboy/scp-action@master
      with:
        host: 3.93.52.143
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "build"
        target: "/var/www/html/"